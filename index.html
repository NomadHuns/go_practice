<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Go 웹 계산기</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select, button { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 20px; font-size: 1.2rem; font-weight: bold; color: #333; }
    </style>
</head>
<body>
<div class="card">
    <h2>🧮 Go 웹 계산기</h2>
    <form action="/calculate" method="GET">
        <input type="number" name="a" placeholder="숫자 1" required step="any">
        <select name="op">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>
        <input type="number" name="b" placeholder="숫자 2" required step="any">
        <button type="submit">계산하기</button>
    </form>

    {{if .Result}}
    <div class="result">
        결과: {{.Num1}} {{.Op}} {{.Num2}} = {{.Result}}
    </div>
    {{end}}

    {{if .Error}}
    <div class="result" style="color: red;">
        오류: {{.Error}}
    </div>
    {{end}}
</div>
</body>
</html>
